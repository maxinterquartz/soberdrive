<!DOCTYPE html>
<html>
<head>
    <title>Управление комментариями</title>
    <meta charset="utf-8">
</head>
<body>
    <h1>Админ-панель Remark42</h1>
    <div id="remark42"></div>
    <script>
        var remark_config = {
            host: "https://talk.soberdrive.ru",
            site_id: "soberdrive",
            components: ["embed"]
        };
    </script>
    <script>
        !function(e,n){
            for(var o=0;o<e.length;o++){
                var r=n.createElement("script"),c=e[o];
                r.src=c.host+"/web/"+c.component+".js",
                r.async=!0,
                n.head.appendChild(r)
            }
        }([{component:"embed",host:remark_config.host}],document);
    </script>
</body>
</html>
